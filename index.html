<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #FFF5F5;
    color: #333;
    min-height: 100vh;
    overscroll-behavior-y: none;
    -webkit-font-smoothing: antialiased;
  }
  #app {
    max-width: 420px;
    margin: 0 auto;
    padding: 20px 16px 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 100vh;
  }

  @keyframes nascer {
    0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
    60% { transform: scale(1.2) rotate(5deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes pulsar-suave {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }
  @keyframes onda-barra {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes quicar {
    0% { transform: scale(1); }
    30% { transform: scale(0.92); }
    50% { transform: scale(1.05); }
    70% { transform: scale(0.98); }
    100% { transform: scale(1); }
  }
  @keyframes confete {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-60px) rotate(360deg); opacity: 0; }
  }
  @keyframes flutuar-suave {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  @keyframes deslizar-baixo {
    from { opacity: 0; transform: translateY(-8px); max-height: 0; }
    to { opacity: 1; transform: translateY(0); max-height: 400px; }
  }

  .header { text-align: center; margin-top: 8px; }
  .header h1 {
    font-size: 22px;
    color: #FF7597;
    margin: 0 0 4px 0;
    font-weight: 700;
  }
  .header p {
    font-size: 14px;
    color: #FFA6C9;
    margin: 0;
  }

  .card-principal {
    background: #ffffff;
    border-radius: 24px;
    padding: 28px 24px 24px;
    text-align: center;
    box-shadow: 0 8px 24px rgba(255, 182, 193, 0.25);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    border: 2px solid #FFE4E1;
  }
  .emoji-status {
    font-size: 56px;
    line-height: 1;
    animation: pulsar-suave 3s infinite ease-in-out;
    display: inline-block;
  }
  .emoji-status.mudou {
    animation: nascer 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .txt-meta {
    font-size: 13px;
    color: #FF94B4;
    font-weight: 600;
  }
  .contador-grande {
    font-size: 52px;
    font-weight: 700;
    color: #FF5C8A;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }
  .txt-ml {
    font-size: 20px;
    color: #FFB7CE;
    font-weight: 400;
  }
  .barra-fundo {
    width: 100%;
    height: 18px;
    background: #FFF0F5;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid #FFE4E1;
    margin-top: 8px;
    position: relative;
  }
  .barra-preenchida {
    height: 100%;
    background: linear-gradient(90deg, #FF8DA1, #FF5C8A, #FF8DA1);
    background-size: 200% 100%;
    border-radius: 20px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    min-width: 0%;
    animation: onda-barra 3s linear infinite;
  }
  .txt-porcentagem {
    font-size: 13px;
    color: #FF7597;
    margin: 6px 0 0 0;
    font-weight: 600;
  }

  .seletor-qtd {
    background: #ffffff;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 6px 18px rgba(255, 182, 193, 0.15);
    border: 1px solid #FFE4E1;
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
  }
  .label-qtd {
    font-size: 14px;
    color: #FF7597;
    font-weight: 600;
  }
  .controle-qtd {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .btn-step {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid #FFD1DC;
    background: #FFEBF0;
    color: #FF5C8A;
    font-size: 22px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s ease, background 0.2s ease;
    -webkit-appearance: none;
    touch-action: manipulation;
  }
  .btn-step:active {
    transform: scale(0.9);
    background: #FFD1DC;
  }
  .display-qtd {
    font-size: 32px;
    font-weight: 700;
    color: #FF5C8A;
    width: 100px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    border: none;
    background: transparent;
    outline: none;
  }
  .display-qtd:focus {
    border-bottom: 2px solid #FF5C8A;
  }

  .label-bebida {
    font-size: 13px;
    color: #FFA6C9;
    font-weight: 600;
    margin-top: 4px;
  }
  .botoes-bebida {
    display: flex;
    gap: 8px;
    width: 100%;
    justify-content: center;
  }
  .btn-bebida {
    flex: 1;
    padding: 12px 4px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 12px;
    border: 2px solid transparent;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s ease;
    -webkit-appearance: none;
    touch-action: manipulation;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .btn-bebida .icone-bebida {
    font-size: 22px;
  }
  .btn-bebida.agua { background: #E8F4FD; color: #2B95D2; border-color: #B8DFF7; }
  .btn-bebida.cafe { background: #F5E6D3; color: #8B5E3C; border-color: #E0C9A8; }
  .btn-bebida.cha { background: #E6F5E6; color: #4A9B5E; border-color: #B8DDB8; }
  .btn-bebida.suco { background: #FFF3E0; color: #E67E22; border-color: #FFD8A8; }
  .btn-bebida.ativo.agua { background: #2B95D2; color: #fff; border-color: #2B95D2; box-shadow: 0 4px 12px rgba(43,149,210,0.3); }
  .btn-bebida.ativo.cafe { background: #8B5E3C; color: #fff; border-color: #8B5E3C; box-shadow: 0 4px 12px rgba(139,94,60,0.3); }
  .btn-bebida.ativo.cha { background: #4A9B5E; color: #fff; border-color: #4A9B5E; box-shadow: 0 4px 12px rgba(74,155,94,0.3); }
  .btn-bebida.ativo.suco { background: #E67E22; color: #fff; border-color: #E67E22; box-shadow: 0 4px 12px rgba(230,126,34,0.3); }
  .btn-bebida:active { transform: scale(0.95); }

  .btn-registrar {
    width: 100%;
    padding: 18px;
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, #FF8DA1, #FF5C8A);
    color: #fff;
    border: none;
    border-radius: 18px;
    cursor: pointer;
    text-align: center;
    box-shadow: 0 6px 20px rgba(255, 92, 138, 0.35);
    transition: transform 0.15s ease, box-shadow 0.2s ease;
    -webkit-appearance: none;
    touch-action: manipulation;
    position: relative;
    overflow: hidden;
  }
  .btn-registrar:active {
    transform: scale(0.96);
    box-shadow: 0 3px 10px rgba(255, 92, 138, 0.25);
  }
  .btn-registrar.clicado { animation: quicar 0.4s ease; }

  .confete-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 9999;
  }
  .confete {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    animation: confete 0.8s ease-out forwards;
  }

  /* === HISTÓRICO POR DATA === */
  .secao-historico {
    background: #ffffff;
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 6px 18px rgba(255, 182, 193, 0.12);
    border: 1px solid #FFE4E1;
    flex: 1;
  }
  .titulo-historico {
    font-size: 15px;
    color: #FF7597;
    margin: 0 0 14px 0;
    border-bottom: 2px dashed #FFE4E1;
    padding-bottom: 8px;
    font-weight: 700;
  }
  .aba-dia {
    border-radius: 14px;
    border: 1px solid #FFE4E1;
    margin-bottom: 10px;
    overflow: hidden;
    transition: box-shadow 0.2s ease;
  }
  .aba-dia:hover, .aba-dia:active {
    box-shadow: 0 4px 12px rgba(255, 182, 193, 0.15);
  }
  .aba-cabecalho {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    background: #FFF8FA;
    cursor: pointer;
    transition: background 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .aba-cabecalho:active { background: #FFF0F5; }
  .aba-data {
    font-size: 15px;
    font-weight: 700;
    color: #FF5C8A;
  }
  .aba-total {
    font-size: 14px;
    font-weight: 600;
    color: #FF7597;
  }
  .aba-seta {
    font-size: 12px;
    color: #FFA6C9;
    margin-left: 8px;
    transition: transform 0.3s ease;
  }
  .aba-seta.aberta { transform: rotate(180deg); }
  .aba-conteudo {
    display: none;
    padding: 0 16px 14px;
    background: #ffffff;
  }
  .aba-conteudo.aberta {
    display: block;
    animation: deslizar-baixo 0.35s ease-out;
  }
  .btn-deletar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: #FFF0F5;
    color: #FF7597;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 8px;
    opacity: 0.6;
    transition: all 0.2s ease;
    -webkit-appearance: none;
    touch-action: manipulation;
  }
  .btn-deletar:active {
    opacity: 1;
    background: #FF5C8A;
    color: #fff;
    transform: scale(0.9);
  }
  .registro-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #FFF0F5;
  }
  .registro-item:last-child { border-bottom: none; }
  .registro-hora {
    font-size: 12px;
    color: #FFA6C9;
    font-weight: 500;
    min-width: 44px;
  }
  .registro-tipo {
    font-size: 18px;
    margin: 0 8px;
  }
  .registro-qtd {
    font-size: 14px;
    color: #FF5C8A;
    font-weight: 600;
    flex: 1;
    text-align: right;
  }
  .txt-vazio {
    font-size: 13px;
    color: #FFB7CE;
    text-align: center;
    padding: 20px 0;
  }

  .botao-reset {
    background: transparent;
    color: #FFB7CE;
    border: none;
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
    padding: 8px;
    font-weight: 500;
    align-self: center;
    -webkit-appearance: none;
    touch-action: manipulation;
  }

  .notificacao {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(-120%);
    background: #FF5C8A;
    color: white;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(255, 92, 138, 0.3);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 1000;
    white-space: nowrap;
  }
  .notificacao.visivel {
    transform: translateX(-50%) translateY(0);
  }

  .meta-input {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 4px;
  }
  .meta-input input {
    width: 60px;
    text-align: center;
    border: 1px solid #FFD1DC;
    border-radius: 8px;
    padding: 4px;
    font-size: 14px;
    color: #FF5C8A;
    font-weight: 600;
    background: #FFF5F5;
  }
  .meta-input button {
    background: #FFEBF0;
    border: 1px solid #FFD1DC;
    border-radius: 8px;
    padding: 4px 10px;
    color: #FF5C8A;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }

  .gotinha {
    position: fixed;
    font-size: 20px;
    opacity: 0.15;
    pointer-events: none;
    animation: flutuar-suave 4s infinite ease-in-out;
  }
  .gotinha:nth-child(1) { top: 10%; left: 8%; animation-delay: 0s; }
  .gotinha:nth-child(2) { top: 25%; right: 10%; animation-delay: 1s; font-size: 14px; }
  .gotinha:nth-child(3) { top: 60%; left: 5%; animation-delay: 2s; font-size: 16px; }
  .gotinha:nth-child(4) { bottom: 20%; right: 8%; animation-delay: 0.5s; font-size: 18px; }
</style>
</head>
<body>

<div class="gotinha">💧</div>
<div class="gotinha">💧</div>
<div class="gotinha">💧</div>
<div class="gotinha">💧</div>

<div id="notificacao" class="notificacao"></div>
<div id="confete-container" class="confete-container"></div>

<div id="app">
  <div class="header">
    <h1>💧 Meu Cantinho da Hidratação</h1>
    <p>Seu controle de água mais fofo ✨</p>
  </div>

  <div class="card-principal">
    <div class="emoji-status" id="emoji-status">🌱</div>
    <div class="txt-meta">
      Sua meta: <span id="meta-display">2000</span> ml
      <div class="meta-input" id="meta-editor" style="display:none;">
        <input type="number" id="meta-input" value="2000" min="500" max="5000" step="100">
        <button onclick="salvarMeta()">OK</button>
      </div>
    </div>
    <div class="contador-grande">
      <span id="contador">0</span> <span class="txt-ml">ml</span>
    </div>
    <div class="barra-fundo">
      <div class="barra-preenchida" id="barra" style="width: 0%"></div>
    </div>
    <p class="txt-porcentagem"><span id="porcentagem">0</span>% concluído! Maravilhosa 💕</p>
  </div>

  <div class="seletor-qtd">
    <div class="label-qtd">Quanto você bebeu?</div>
    <div class="controle-qtd">
      <button class="btn-step" onclick="ajustarQtd(-50)">−</button>
      <input type="number" class="display-qtd" id="qtd-input" value="250" min="50" max="2000" step="50" onchange="validarQtd()">
      <button class="btn-step" onclick="ajustarQtd(50)">+</button>
    </div>

    <div class="label-bebida">O que bebeu?</div>
    <div class="botoes-bebida">
      <button class="btn-bebida agua ativo" onclick="selecionarBebida('agua', this)">
        <span class="icone-bebida">🥤</span>
        <span>Água</span>
      </button>
      <button class="btn-bebida cafe" onclick="selecionarBebida('cafe', this)">
        <span class="icone-bebida">☕</span>
        <span>Café</span>
      </button>
      <button class="btn-bebida cha" onclick="selecionarBebida('cha', this)">
        <span class="icone-bebida">🍵</span>
        <span>Chá</span>
      </button>
      <button class="btn-bebida suco" onclick="selecionarBebida('suco', this)">
        <span class="icone-bebida">🧃</span>
        <span>Suco</span>
      </button>
    </div>

    <button class="btn-registrar" id="btn-registrar" onclick="registrar()">
      ✨ Registrar ingestão
    </button>
  </div>

  <div class="secao-historico">
    <h2 class="titulo-historico">📅 Registros do Dia</h2>
    <div id="historico-container">
      <p class="txt-vazio">Nenhum registro ainda. Comece a beber água! 🌸</p>
    </div>
  </div>

  <button class="botao-reset" onclick="toggleMeta()">⚙️ Alterar meta</button>
</div>

<script>
  const LS_REGISTROS = 'hidratacao_registros';
  const LS_META = 'hidratacao_meta';
  const LS_DATA = 'hidratacao_data';

  let META_DIARIA = 2000;
  let aguaHoje = 0;
  let registros = {};
  let bebidaAtual = 'agua';
  let emojiAnterior = '🌱';

  const emojisBebida = { agua: '🥤', cafe: '☕', cha: '🍵', suco: '🧃' };
  const nomesBebida = { agua: 'Água', cafe: 'Café', cha: 'Chá', suco: 'Suco' };

  function obterDataHoje() {
    return new Date().toISOString().split('T')[0];
  }

  function formatarData(dataStr) {
    const [ano, mes, dia] = dataStr.split('-');
    return dia + '/' + mes;
  }

  function obterEmojiStatus(pct) {
    if (pct >= 100) return '👑💖';
    if (pct >= 75) return '✨🦄';
    if (pct >= 50) return '🌸🦩';
    if (pct >= 25) return '🌷🧸';
    return '🌱🥤';
  }

  function mostrarNotificacao(msg) {
    const el = document.getElementById('notificacao');
    el.textContent = msg;
    el.classList.add('visivel');
    setTimeout(() => el.classList.remove('visivel'), 2200);
  }

  function salvarDados() {
    localStorage.setItem(LS_REGISTROS, JSON.stringify(registros));
    localStorage.setItem(LS_META, META_DIARIA.toString());
    localStorage.setItem(LS_DATA, obterDataHoje());
  }

  function carregarDados() {
    const metaSalva = localStorage.getItem(LS_META);
    if (metaSalva) META_DIARIA = parseInt(metaSalva, 10);

    const dataSalva = localStorage.getItem(LS_DATA);
    const dataHoje = obterDataHoje();

    const registrosSalvos = localStorage.getItem(LS_REGISTROS);
    if (registrosSalvos) {
      registros = JSON.parse(registrosSalvos);
    }

    if (dataSalva && dataSalva !== dataHoje) {
      aguaHoje = 0;
      mostrarNotificacao('✨ Novo dia! Contador zerado automaticamente');
    } else {
      calcularTotalHoje();
    }

    salvarDados();
  }

  function calcularTotalHoje() {
    const hoje = obterDataHoje();
    const lista = registros[hoje] || [];
    aguaHoje = lista.reduce((s, r) => s + r.qtd, 0);
  }

  function atualizarUI() {
    const pct = Math.min((aguaHoje / META_DIARIA) * 100, 100);
    const novoEmoji = obterEmojiStatus(pct);
    const elEmoji = document.getElementById('emoji-status');

    if (novoEmoji !== emojiAnterior) {
      elEmoji.textContent = novoEmoji;
      elEmoji.classList.remove('mudou');
      void elEmoji.offsetWidth;
      elEmoji.classList.add('mudou');
      emojiAnterior = novoEmoji;
    } else {
      elEmoji.textContent = novoEmoji;
    }

    document.getElementById('contador').textContent = aguaHoje;
    document.getElementById('porcentagem').textContent = pct.toFixed(0);
    document.getElementById('barra').style.width = pct + '%';
    document.getElementById('meta-display').textContent = META_DIARIA;

    renderizarHistorico();
  }

  function renderizarHistorico() {
    const container = document.getElementById('historico-container');
    const datas = Object.keys(registros).sort((a, b) => b.localeCompare(a));

    if (datas.length === 0) {
      container.innerHTML = '<p class="txt-vazio">Nenhum registro ainda. Comece a beber água! 🌸</p>';
      return;
    }

    let html = '';
    datas.forEach(data => {
      const lista = registros[data];
      const total = lista.reduce((s, r) => s + r.qtd, 0);
      const atingiu = total >= META_DIARIA;
      const dataFormatada = formatarData(data);
      const aberta = data === obterDataHoje() ? 'aberta' : '';

      html += '<div class="aba-dia">';
      html += '<div class="aba-cabecalho" onclick="toggleAba(this)">';
      html += '<span class="aba-data">' + dataFormatada + '</span>';
      html += '<span class="aba-total">' + total + ' ml ' + (atingiu ? '💝' : '🎀') + ' <span class="aba-seta ' + aberta + '">▼</span></span>';
      html += '</div>';
      html += '<div class="aba-conteudo ' + aberta + '">';
      lista.forEach((r, idx) => {
        html += '<div class="registro-item">';
        html += '<span class="registro-hora">' + r.hora + '</span>';
        html += '<span class="registro-tipo">' + emojisBebida[r.tipo] + '</span>';
        html += '<span class="registro-qtd">' + r.qtd + ' ml <span style="font-size:11px;color:#FFA6C9;font-weight:500;">' + nomesBebida[r.tipo] + '</span></span>';
        html += '<button class="btn-deletar" onclick="deletarRegistro(event, \'' + data + '\', ' + idx + ')" title="Apagar">🗑️</button>';
        html += '</div>';
      });
      html += '</div>';
      html += '</div>';
    });

    container.innerHTML = html;
  }

  function deletarRegistro(event, data, idx) {
    event.stopPropagation();
    if (!confirm('Apagar este registro?')) return;

    const lista = registros[data];
    if (lista && lista[idx]) {
      lista.splice(idx, 1);
      if (lista.length === 0) {
        delete registros[data];
      }
      salvarDados();
      calcularTotalHoje();
      atualizarUI();
      mostrarNotificacao('🗑️ Registro apagado');
    }
  }

  function toggleAba(cabecalho) {
    const conteudo = cabecalho.nextElementSibling;
    const seta = cabecalho.querySelector('.aba-seta');
    const aberta = conteudo.classList.contains('aberta');

    if (aberta) {
      conteudo.classList.remove('aberta');
      seta.classList.remove('aberta');
    } else {
      conteudo.classList.add('aberta');
      seta.classList.add('aberta');
    }
  }

  function ajustarQtd(delta) {
    const input = document.getElementById('qtd-input');
    let val = parseInt(input.value, 10) || 0;
    val += delta;
    if (val < 50) val = 50;
    if (val > 2000) val = 2000;
    input.value = val;
  }

  function validarQtd() {
    const input = document.getElementById('qtd-input');
    let val = parseInt(input.value, 10) || 0;
    if (val < 50) val = 50;
    if (val > 2000) val = 2000;
    input.value = val;
  }

  function selecionarBebida(tipo, btn) {
    bebidaAtual = tipo;
    document.querySelectorAll('.btn-bebida').forEach(b => b.classList.remove('ativo'));
    btn.classList.add('ativo');
  }

  function criarConfete() {
    const container = document.getElementById('confete-container');
    container.innerHTML = '';
    const cores = ['#FF8DA1', '#FF5C8A', '#FFD1DC', '#FFA6C9', '#FFE4E1', '#4A9B5E', '#E67E22'];
    for (let i = 0; i < 16; i++) {
      const c = document.createElement('div');
      c.className = 'confete';
      c.style.background = cores[Math.floor(Math.random() * cores.length)];
      c.style.left = (Math.random() * 100 - 50) + 'px';
      c.style.top = (Math.random() * 40 - 20) + 'px';
      c.style.animationDelay = (Math.random() * 0.3) + 's';
      c.style.width = (6 + Math.random() * 6) + 'px';
      c.style.height = (6 + Math.random() * 6) + 'px';
      container.appendChild(c);
    }
    setTimeout(() => { container.innerHTML = ''; }, 1200);
  }

  function registrar() {
    const input = document.getElementById('qtd-input');
    let qtd = parseInt(input.value, 10) || 0;
    if (qtd <= 0) return;

    const dataHoje = obterDataHoje();
    const agora = new Date();
    const hora = String(agora.getHours()).padStart(2, '0') + ':' + String(agora.getMinutes()).padStart(2, '0');

    if (!registros[dataHoje]) registros[dataHoje] = [];
    registros[dataHoje].push({ hora: hora, qtd: qtd, tipo: bebidaAtual });

    aguaHoje += qtd;
    salvarDados();
    atualizarUI();

    const btn = document.getElementById('btn-registrar');
    btn.classList.remove('clicado');
    void btn.offsetWidth;
    btn.classList.add('clicado');

    const pct = (aguaHoje / META_DIARIA) * 100;
    const pctAntes = ((aguaHoje - qtd) / META_DIARIA) * 100;

    if (pct >= 100 && pctAntes < 100) {
      criarConfete();
      mostrarNotificacao('🎉 Meta atingida! Você é incrível!');
    } else {
      mostrarNotificacao(emojisBebida[bebidaAtual] + ' +' + qtd + 'ml registrado!');
    }
  }

  function toggleMeta() {
    const editor = document.getElementById('meta-editor');
    const input = document.getElementById('meta-input');
    if (editor.style.display === 'none') {
      editor.style.display = 'flex';
      input.value = META_DIARIA;
      input.focus();
    } else {
      editor.style.display = 'none';
    }
  }

  function salvarMeta() {
    const input = document.getElementById('meta-input');
    let novaMeta = parseInt(input.value, 10);
    if (isNaN(novaMeta) || novaMeta < 500) novaMeta = 500;
    if (novaMeta > 5000) novaMeta = 5000;
    META_DIARIA = novaMeta;
    document.getElementById('meta-editor').style.display = 'none';
    salvarDados();
    atualizarUI();
    mostrarNotificacao('Meta atualizada para ' + novaMeta + ' ml');
  }

  carregarDados();
  atualizarUI();

  setInterval(() => {
    const dataSalva = localStorage.getItem(LS_DATA);
    const dataHoje = obterDataHoje();
    if (dataSalva && dataSalva !== dataHoje) {
      carregarDados();
      atualizarUI();
    }
  }, 60000);

  document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('touchstart', function() {}, { passive: true });
  });
</script>

</body>
</html>
